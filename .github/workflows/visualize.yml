name: Visualize Holocene DA Results

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Holocene DA Reconstruction"]
    types: [completed]

jobs:
  find-latest-run:
    name: Find Latest Reconstruction Run
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    outputs:
      run_number: ${{ steps.get_run.outputs.run_number }}
      run_id: ${{ steps.get_run.outputs.run_id }}
      artifact_name: ${{ steps.get_run.outputs.artifact_name }}

    steps:
        - name: Find reconstruction run and artifact
          id: get_run
          env:
            GH_TOKEN: ${{ github.token }}
          run: |
            if [ "${{ github.event_name }}" = "workflow_run" ]; then
              run_id="${{ github.event.workflow_run.id }}"
              run_number="${{ github.event.workflow_run.run_number }}"
            else
              latest_run=$(gh api \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "/repos/${{ github.repository }}/actions/workflows/holocene_da.yml/runs?status=success&per_page=1" \
                --jq '.workflow_runs[0]')
              run_id=$(echo "$latest_run" | jq -r '.id')
              run_number=$(echo "$latest_run" | jq -r '.run_number')
            fi

            if [ "$run_id" = "null" ] || [ -z "$run_id" ]; then
              echo "Error: No successful Holocene DA runs found"
              exit 1
            fi

            artifact_name="holocene-da-reconstruction-${run_id}"
            echo "run_id=$run_id" >> $GITHUB_OUTPUT
            echo "run_number=$run_number" >> $GITHUB_OUTPUT
            echo "artifact_name=$artifact_name" >> $GITHUB_OUTPUT

  download-artifact:
    name: Download Reconstruction Artifact
    needs: find-latest-run
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download artifact from reconstruction run
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.find-latest-run.outputs.artifact_name }}
          path: ./recon-data
          run-id: ${{ needs.find-latest-run.outputs.run_id }}
          github-token: ${{ github.token }}

      - name: Verify downloaded files
        run: |
          echo "Downloaded reconstruction artifacts:"
          ls -lh ./recon-data/
          echo ""
          echo "NetCDF files:"
          find ./recon-data -type f -name "*.nc" | head -20

      - name: Flatten directory structure
        run: |
          echo "Flattening directory structure for presto-viz..."
          find ./recon-data -type f -name "*.nc" -exec mv {} ./recon-data/ \;
          find ./recon-data -type d -empty -delete
          echo ""
          echo "Files after flattening:"
          ls -lh ./recon-data/

      - name: Generate configs.yml for visualization
        run: |
          if [ ! -f ./recon-data/configs.yml ] && [ -f config/user_config.yml ]; then
            echo "Generating configs.yml from user_config.yml..."
            python3 -c "
          import yaml
          with open('config/user_config.yml') as f:
              flat = yaml.safe_load(f)
          nested = {'presto_config': {k: {'value': str(v)} for k, v in flat.items()}}
          with open('recon-data/configs.yml', 'w') as f:
              yaml.dump(nested, f, default_flow_style=False)
          "
            echo "Generated configs.yml:"
            cat ./recon-data/configs.yml
          elif [ -f ./recon-data/configs.yml ]; then
            echo "configs.yml already present in artifact"
          else
            echo "WARNING: No config file found, visualization may fail"
          fi

      - name: Re-upload for presto-viz
        uses: actions/upload-artifact@v4
        with:
          name: recon-data-for-viz-${{ github.run_number }}
          path: ./recon-data/
          retention-days: 7

  validate:
    name: Run Validation
    needs: [find-latest-run, download-artifact]
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      actions: read   # for gh run download of holocene-da-proxy-data

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download reconstruction data artifact
        uses: actions/download-artifact@v4
        with:
          name: recon-data-for-viz-${{ github.run_number }}
          path: ./recon-data

      - name: Verify reconstruction data
        run: |
          echo "Available NetCDF files:"
          ls -lh ./recon-data/*.nc || echo "No .nc files found"

      - name: Build patched container image
        # Layers scripts/ over davidedge/lipd_webapps:holocene_da. Same
        # image used for both the comparison and the validation step below.
        run: docker build -t presto-holocene_da:local .

      - name: Download proxy data artifact
        # Has 7-day retention, so older runs may be missing it. The
        # comparison step is best-effort and will be skipped if the
        # pickle isn't recoverable.
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p ./prepare-data
          if gh run download "${{ needs.find-latest-run.outputs.run_id }}" \
               --repo "${{ github.repository }}" \
               --name "holocene-da-proxy-data-${{ needs.find-latest-run.outputs.run_id }}" \
               --dir ./prepare-data 2>/dev/null; then
            echo "Proxy data recovered:"
            ls -lh ./prepare-data/
          else
            echo "holocene-da-proxy-data unavailable (likely expired) — skipping comparison."
          fi

      - name: Generate proxy comparison vs Temp12k 1.0.2
        # Builds comparison.json + temporal/spatial PNGs + per-set CSVs in
        # ./validation, which validate_holocene_da.py then surfaces in a
        # collapsible "Proxy Database vs Temp12k 1.0.2" HTML section.
        continue-on-error: true
        run: |
          if [ ! -f ./prepare-data/lipd_legacy.pkl ]; then
            echo "lipd_legacy.pkl not present — skipping comparison."
            exit 0
          fi
          mkdir -p ./validation
          # The comparison script is baked into the locally-built image
          # at /app/compare_to_temp12k_v102.py (via Dockerfile COPY of
          # scripts/), so no script mount-override is needed.
          docker run --rm \
            --entrypoint conda \
            -v $(pwd)/prepare-data/lipd_legacy.pkl:/app/lipd_legacy.pkl:ro \
            -v $(pwd)/validation:/validation \
            presto-holocene_da:local \
            run --no-capture-output -n python3_da python /app/compare_to_temp12k_v102.py \
              --custom-pickle /app/lipd_legacy.pkl \
              --out-dir       /validation

      - name: Run validation script
        run: |
          mkdir -p ./validation
          # validate_holocene_da.py is baked into the local image
          # at /app/validate_holocene_da.py via the Dockerfile COPY.
          docker run --rm \
            --entrypoint conda \
            -v $(pwd)/recon-data:/recons:ro \
            -v $(pwd)/reference_data:/reference_data:ro \
            -v $(pwd)/validation:/validation \
            -e RECON_DIR=/recons \
            -e VALIDATION_DIR=/validation \
            -e REFERENCE_DIR=/reference_data \
            -e COMPARISON_JSON=/validation/comparison.json \
            presto-holocene_da:local \
            run --no-capture-output -n python3_da python /app/validate_holocene_da.py

      - name: Upload validation artifact
        uses: actions/upload-artifact@v4
        with:
          name: validation-output-${{ github.run_number }}
          path: ./validation/
          retention-days: 30

  visualize:
    name: Generate Presto Visualization
    needs: [find-latest-run, download-artifact]
    uses: DaveEdge1/presto-viz/.github/workflows/presto-viz-reusable.yml@main
    with:
      reconstruction_id: HoloceneDA_Run_${{ needs.find-latest-run.outputs.run_number }}_Reviz_${{ github.run_number }}
      artifact_name: recon-data-for-viz-${{ github.run_number }}

  deploy-to-github-pages:
    name: Deploy to GitHub Pages
    needs: [find-latest-run, visualize, validate]
    if: always() && needs.visualize.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download visualization artifact
        uses: actions/download-artifact@v4
        with:
          name: presto-viz-output-HoloceneDA_Run_${{ needs.find-latest-run.outputs.run_number }}_Reviz_${{ github.run_number }}
          path: ./visualization-output

      - name: Download validation artifact
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: validation-output-${{ github.run_number }}
          path: ./visualization-output/validation

      - name: Prepare Pages content
        run: |
          find ./visualization-output -type f -name "*.zip" -delete
          if [ -d "visualization-output/viz" ]; then
            mv visualization-output/viz visualization-output/docs
          fi

          # Copy icon images (committed to repo) into the deployment
          mkdir -p ./visualization-output/images
          cp images/visualization.png images/validation.png ./visualization-output/images/ 2>/dev/null || true

          # Conditionally include the validation tile
          VALIDATION_TILE=""
          if [ -f "./visualization-output/validation/index.html" ]; then
            VALIDATION_TILE='<a class="tile" href="validation/index.html"><img src="images/validation.png" alt="Reconstruction Validation"><span>Reconstruction Validation</span></a>'
          fi

          # Conditionally include the visualization tile
          VIZ_TILE=""
          if [ -f "./visualization-output/docs/visualizer.html" ]; then
            VIZ_TILE='<a class="tile" href="docs/visualizer.html"><img src="images/visualization.png" alt="Visualize Results"><span>Visualize Results</span></a>'
          fi

          cat > ./visualization-output/index.html << HTMLEOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Holocene DA Reconstruction - PReSto Custom</title>
            <style>
              :root {
                --bg: #f7f8fa;
                --fg: #1a1a1a;
                --accent: #2563eb;
                --tile-bg: #ffffff;
                --tile-shadow: 0 2px 8px rgba(0,0,0,0.08);
                --tile-shadow-hover: 0 6px 18px rgba(0,0,0,0.14);
              }
              * { box-sizing: border-box; }
              body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                background: var(--bg);
                color: var(--fg);
                margin: 0;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
              }
              header {
                text-align: center;
                padding: 48px 24px 24px;
              }
              header h1 {
                margin: 0;
                font-size: 2rem;
                font-weight: 600;
                color: var(--fg);
              }
              main {
                flex: 1;
                display: flex;
                justify-content: center;
                align-items: center;
                padding: 24px;
              }
              .tiles {
                display: flex;
                flex-wrap: wrap;
                gap: 32px;
                justify-content: center;
              }
              .tile {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: flex-start;
                width: clamp(240px, 32vw, 480px);
                padding: clamp(20px, 2.5vw, 40px);
                background: var(--tile-bg);
                border-radius: 12px;
                box-shadow: var(--tile-shadow);
                text-decoration: none;
                color: var(--fg);
                transition: transform 0.15s ease, box-shadow 0.15s ease;
              }
              .tile:hover {
                transform: translateY(-3px);
                box-shadow: var(--tile-shadow-hover);
              }
              .tile img {
                width: 100%;
                height: clamp(160px, 22vw, 360px);
                object-fit: contain;
                margin-bottom: 20px;
              }
              .tile span {
                font-size: clamp(1.1rem, 1.6vw, 1.5rem);
                font-weight: 500;
                color: var(--accent);
                text-align: center;
              }
              footer {
                text-align: center;
                padding: 32px 24px 40px;
              }
              footer img {
                max-width: 180px;
                height: auto;
                opacity: 0.85;
              }
            </style>
          </head>
          <body>
            <header>
              <h1>Holocene DA Reconstruction - PReSto Custom</h1>
            </header>
            <main>
              <div class="tiles">
                ${VALIDATION_TILE}
                ${VIZ_TILE}
              </div>
            </main>
            <footer>
              <img src="docs/assets/logo.png" alt="PReSto logo">
            </footer>
          </body>
          </html>
          HTMLEOF

          ls -lah ./visualization-output/
          ls -lah ./visualization-output/images/ 2>/dev/null || true
          ls -lah ./visualization-output/validation/ 2>/dev/null || echo "No validation output"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./visualization-output

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # Homepage URL is set by the PReSto webhook handler using the user's
      # OAuth token (GITHUB_TOKEN lacks admin permission to update repo settings).
